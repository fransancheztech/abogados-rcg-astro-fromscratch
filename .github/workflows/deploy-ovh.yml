name: Deploy to OVH

on:
  # Deploy whenever the production branch is updated
  push:
    branches: [ main ]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      # OVH's FTP server rejects explicit FTPS (AUTH TLS), so we deploy over
      # SFTP (port 22) instead — the same secure method used for the backup.
      - name: Deploy dist/ to OVH via SFTP
        env:
          # sshpass -e reads the password from the SSHPASS env var
          SSHPASS: ${{ secrets.OVH_FTP_PASSWORD }}
          SFTP_USER: ${{ secrets.OVH_FTP_USERNAME }}
          SFTP_HOST: ${{ secrets.OVH_FTP_SERVER }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp sshpass
          # `./www/` is relative to the SFTP login home (/home/<user>), which is
          # where OVH shared hosting serves the site from.
          lftp -u "$SFTP_USER,dummy" "sftp://$SFTP_HOST" <<'SCRIPT'
          set sftp:auto-confirm yes
          set sftp:connect-program "sshpass -e ssh -a -x -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          mirror --reverse --verbose --delete ./dist/ ./www/
          bye
          SCRIPT
